<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #111;
            color: #fff;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 2em;
            letter-spacing: 2px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            padding: 10px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>coast</header>

<div class="gallery">
    <img src="index/images/DO01020339.JPEG" alt="Photo 1">
    <img src="index/images/DO01020342.JPEG" alt="Photo 2">
    <img src="index/images/DO01020353.JPG" alt="Photo 3">
    <img src="index/images/DO01020354.JPG" alt="Photo 4">
    <img src="index/images/DO01020355.JPG" alt="Photo 5">
    <img src="index/images/DO01020356.JPG" alt="Photo 6">
    <img src="index/images/IMG_1203.jpeg" alt="Photo 7">
</div>

</body>
</html>
