<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coast</title>

<style>
:root {
  /* background (fog / paper / SF overcast) */
  --bg: #d6d9df;

  /* primary ink (text / structure) */
  --ink: #0f1722;

  /* secondary ink (subtext / captions / metadata) */
  --ink-soft: rgba(15, 23, 34, 0.55);

  /* structural lines */
  --border: rgba(15, 23, 34, 0.18);

  /* faint layering */
  --mist: rgba(15, 23, 34, 0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.4;
  letter-spacing: 0.2px;
}

/* top nav */
.home {
  position: fixed;
  top: 18px;
  right: 48px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: lowercase;
  text-decoration: none;
  color: var(--ink);
  opacity: 0.9;
  z-index: 10;
}

.home:hover {
  opacity: 0.5;
}

/* main wrapper */
.wrapper {
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 120px 24px 80px;
}

/* gallery grid */
.gallery {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: 90px;
  gap: 14px;
}

/* image blocks */
.img {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--mist);
  filter: grayscale(10%) contrast(1.05);
  transition: transform 1s ease, opacity 0.6s ease;
}

.img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* captions */
.img figcaption {
  position: absolute;
  bottom: 8px;
  left: 10px;
  font-size: 9px;
  color: var(--ink-soft);
  letter-spacing: 1px;
  text-transform: lowercase;
}

/* hover = fog lift */
.img:hover {
  transform: scale(1.01);
  opacity: 0.9;
}

/* layout rhythm (editorial asymmetry) */
.i1 { grid-column: 1 / 8; grid-row: span 3; }
.i2 { grid-column: 8 / 13; grid-row: span 4; }
.i3 { grid-column: 1 / 5; grid-row: span 3; }
.i4 { grid-column: 5 / 13; grid-row: span 3; }
.i5 { grid-column: 1 / 9; grid-row: span 4; }
.i6 { grid-column: 9 / 13; grid-row: span 3; }
.i7 { grid-column: 1 / 13; grid-row: span 4; }

/* subtle background texture feel */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.05), transparent 40%),
              radial-gradient(circle at 70% 80%, rgba(0,0,0,0.04), transparent 45%);
  pointer-events: none;
}
</style>
</head>

<body>

<a class="home" href="index.html">home</a>

<div class="wrapper">
  <div class="gallery">

    <figure class="img i1">
      <img src="images/DO01020339.jpeg" alt="coast 1"/>
      <figcaption>01 — shoreline drift</figcaption>
    </figure>

    <figure class="img i2">
      <img src="images/DO01020342.jpeg" alt="coast 2"/>
      <figcaption>02 — tide line</figcaption>
    </figure>

    <figure class="img i3">
      <img src="images/DO01020353.JPG" alt="coast 3"/>
      <figcaption>03 — wind field</figcaption>
    </figure>

    <figure class="img i4">
      <img src="images/DO01020354.JPG" alt="coast 4"/>
      <figcaption>04 — erosion edge</figcaption>
    </figure>

    <figure class="img i5">
      <img src="images/DO01020355.JPG" alt="coast 5"/>
      <figcaption>05 — low fog water</figcaption>
    </figure>

    <figure class="img i6">
      <img src="images/DO01020356.JPG" alt="coast 6"/>
      <figcaption>06 — salt horizon</figcaption>
    </figure>

    <figure class="img i7">
      <img src="images/IMG_1203.jpeg" alt="coast 7"/>
      <figcaption>07 — coastal absence</figcaption>
    </figure>

  </div>
</div>

</body>
</html>
