<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>index — fog and order</title>

  <style>
    :root {
      --bg: #d6d9df;
      --ink: #0b1220;
      --ink-soft: rgba(11, 18, 32, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      letter-spacing: 0.2px;
    }

    .home {
      position: fixed;
      top: 18px;
      right: 48px;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.9;
    }

    .home:hover {
      opacity: 0.5;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .index-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 480px;
      width: 100%;
    }

    .index-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--ink);
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(11, 18, 32, 0.15);
    }

    .index-item span:last-child {
      color: var(--ink-soft);
      font-size: 12px;
    }

    .index-item:hover {
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <!-- link back to main homepage -->
  <a class="home" href="fog_and_order/index.html">home</a>

  <div class="wrapper">
    <div class="index-list">

      <a class="index-item" href="#">
        <span>fog studies i</span>
        <span>2026</span>
      </a>

      <a class="index-item" href="#">
        <span>fog studies ii</span>
        <span>2026</span>
      </a>

      <a class="index-item" href="#">
        <span>light and structure</span>
        <span>2026</span>
      </a>

      <a class="index-item" href="#">
        <span>marina district</span>
        <span>2025</span>
      </a>

    </div>
  </div>

</body>
</html>
