<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>index — fog and order</title>

  <style>
    :root {
  /* background (fog / paper / SF overcast) */
      --bg: #d6d9df;

  /* primary ink (text / structure) */
      --ink: #0f1722;

  /* secondary ink (subtext / captions / metadata) */
      --ink-soft: rgba(15, 23, 34, 0.55);

  /* structural lines (borders / dividers / frames) */
      --border: rgba(15, 23, 34, 0.18);

  /* ultra-faint layering (optional accents, hover states) */
      --mist: rgba(15, 23, 34, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
      letter-spacing: 0.2px;
    }

    .home {
      position: fixed;
      top: 18px;
      right: 48px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.9;
    }

    .home:hover {
      opacity: 0.5;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 12vw;
      padding-right: 24px;
    }

    .index-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 380px;
      width: 100%;
    }

    .index-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--ink);
      padding-left: 14px;
      position: relative;
    }

    .index-item::before {
      content: "•";
      position: absolute;
      left: 0;
      font-size: 12px;
      color: var(--ink-soft);
    }

    .index-item span:last-child {
      color: var(--ink-soft);
      font-size: 10px;
    }

    .index-item:hover {
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <a class="home" href="../index.html">home</a>

  <div class="wrapper">
    <div class="index-list">

      <a class="index-item" href="#">
        <span>coast</span>
        <span>2026</span>
      </a>

      <a class="index-item" href="#">
        <span>marina district</span>
        <span>2026</span>
      </a>

      <a class="index-item" href="#">
        <span>structure</span>
        <span>2026</span>
      </a>

      <a class="index-item" href="#">
        <span>window</span>
        <span>2025</span>
      </a>

    </div>
  </div>

</body>
</html>
