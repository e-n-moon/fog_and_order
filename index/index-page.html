<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>index — fog and order</title>

  <style>
    :root {
  /* background (fog / paper / SF overcast) */
      --bg: #d6d9df;

  /* primary ink (text / structure) */
      --ink: #0f1722;

  /* secondary ink (subtext / captions / metadata) */
      --ink-soft: rgba(15, 23, 34, 0.55);

  /* structural lines (borders / dividers / frames) */
      --border: rgba(15, 23, 34, 0.18);

  /* ultra-faint layering (optional accents, hover states) */
      --mist: rgba(15, 23, 34, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
      letter-spacing: 0.2px;
    }

    .home {
      position: fixed;
      top: 18px;
      right: 48px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.9;
    }

    .home:hover {
      opacity: 0.5;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 12vw;
      padding-right: 24px;
    }


  
    .index-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 380px;
      width: 100%;
    }
    
    /* single clean link row */
    .index-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: lowercase;
      text-decoration: none;
    
      color: var(--ink);
      padding-left: 14px;
    
      position: relative;
      border-bottom: 1px solid transparent;
    }
    
    /* soft bullet */
    .index-item::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--ink-soft);
    }
    
    /* left label */
    .title {
      color: var(--ink);
    }
    
    /* right metadata */
    .year {
      color: var(--ink-soft);
      font-size: 10px;
    }
    
    /* hover = fog fade */
    .index-item:hover {
      opacity: 0.55;
    }
    
    .nav-link {
      color: var(--ink);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }

.nav-link:hover {
  opacity: 0.5;
}
  </style>
</head>

<body>

  <a class="home" href="../index.html">home</a>

  <div class="wrapper">
    <div class="index-list">

        <span class="year">2026</span>
      </a>

        <span class="year">2024</span>

      <a class="index-item" href="natural_history_museum.html">
        <span class="title">natural_history_museum</span>
        <span class="year">2024</span>
      </a>
    
      <a class="index-item" href="coast.html">
        <span class="title">coast</span>
        <span class="year">2026</span>
      </a>

</div>

    </div>
  </div>

</body>
