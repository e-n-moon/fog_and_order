<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>coastal entropy: fort bragg.html</title>

<style>
:root {
  --bg: #d6d9df;
  --ink: #0f1722;
  --ink-soft: rgba(15, 23, 34, 0.55);
  --border: rgba(15, 23, 34, 0.18);
  --mist: rgba(15, 23, 34, 0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.4;
  letter-spacing: 0.2px;
}

/* top nav */
.home {
  position: fixed;
  top: 18px;
  right: 48px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: lowercase;
  text-decoration: none;
  color: var(--ink);
  opacity: 0.9;
  z-index: 10;
}

.home:hover {
  opacity: 0.5;
}

/* main wrapper */
.wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 120px 24px 80px;
}

/* content container */
.content {
  width: 100%;
  max-width: 720px;
}

/* header */
.header {
  margin-bottom: 60px;
}

.header h1 {
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: lowercase;
}

.header p {
  margin-top: 10px;
  font-size: 12px;
  color: var(--ink-soft);
  max-width: 520px;
}

/* gallery */
.gallery {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

/* image blocks */
.img {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--mist);
  aspect-ratio: 3 / 2;
  filter: grayscale(10%) contrast(1.05);
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* captions */
.img figcaption {
  position: absolute;
  bottom: 10px;
  left: 12px;
  font-size: 10px;
  color: var(--ink-soft);
  letter-spacing: 1px;
  text-transform: lowercase;
}

/* hover */
.img:hover {
  transform: scale(1.01);
  opacity: 0.9;
}

/* subtle background texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.05), transparent 40%),
              radial-gradient(circle at 70% 80%, rgba(0,0,0,0.04), transparent 45%);
  pointer-events: none;
}
</style>
</head>

<body>

<a class="home" href="index.html">home</a>

<div class="wrapper">
  <div class="content">

    <div class="header">
      <h1>coastal entropy: fort bragg</h1>
      <p>
       studies of fractures and light forms within the harbours of Fort Bragg. 
      </p>
    </div>

    <div class="gallery">

      <figure class="img">
        <img src="images/DO01020339.jpeg" alt="coast 1"/>
        <figcaption>01 — shoreline drift</figcaption>
      </figure>

      <figure class="img">
        <img src="images/DO01020342.jpeg" alt="coast 2"/>
        <figcaption>02 — tide line</figcaption>
      </figure>

      <figure class="img">
        <img src="images/DO01020353.JPG" alt="coast 3"/>
        <figcaption>03 — wind field</figcaption>
      </figure>

      <figure class="img">
        <img src="images/DO01020354.JPG" alt="coast 4"/>
        <figcaption>04 — erosion edge</figcaption>
      </figure>

      <figure class="img">
        <img src="images/DO01020355.JPG" alt="coast 5"/>
        <figcaption>05 — low fog water</figcaption>
      </figure>

      <figure class="img">
        <img src="images/DO01020356.JPG" alt="coast 6"/>
        <figcaption>06 — salt horizon</figcaption>
      </figure>

      <figure class="img">
        <img src="images/IMG_1203.jpeg" alt="coast 7"/>
        <figcaption>07 — coastal absence</figcaption>
      </figure>

    </div>
  </div>
</div>

<script>
document.addEventListener('contextmenu', function (e) {
  e.preventDefault();
});
</script>

</body>
</html>
