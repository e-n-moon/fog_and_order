<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fog and order</title>

  <style>
:root {
  /* background (fog / paper / SF overcast) */
  --bg: #d6d9df;

  /* primary ink (text / structure) */
  --ink: #0f1722;

  /* secondary ink (subtext / captions / metadata) */
  --ink-soft: rgba(15, 23, 34, 0.55);

  /* structural lines (borders / dividers / frames) */
  --border: rgba(15, 23, 34, 0.18);

  /* ultra-faint layering (optional accents, hover states) */
  --mist: rgba(15, 23, 34, 0.08);
}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
      letter-spacing: 0.2px;
    }

    .index {
      position: fixed;
      top: 18px;
      right: 48px;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.9;
    }

    .index:hover {
      opacity: 0.5;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 520px;
      align-items: center;
    }

    .hero h2 {
      font-size: 40px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: lowercase;
      line-height: 1.1;
    }

    .byline {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: lowercase;
      opacity: 0.8;
    }

    .caption {
      font-size: 12px;
      letter-spacing: 0.5px;
      color: var(--ink-soft);
      max-width: 420px;
      margin-top: 2px;
    }

    .image-placeholder {
      margin-top: 30px;
      width: 100%;
      max-width: 520px;
      aspect-ratio: 4 / 5;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      color: var(--ink-soft);
      opacity: 0.85;
    }
  </style>
</head>

<body>

  <a class="index" href="index/index-page.html" target="_blank">index</a>
  
  <section class="hero">
    <div class="container">
      <h2>fog and order</h2>
      <div class="byline">by evana moon</div>
      <div class="caption">
        san francisco studies in light, decay, and spatial order
      </div>

      <div class="image-placeholder">
        <img src="index/images/DO01020339.jpeg" alt="Description" style="width: 400px; height: auto;">
      </div>
    </div>
  </section>

</body>
</html>
